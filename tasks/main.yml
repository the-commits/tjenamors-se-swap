---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      skip: true
  when: swap_size_mode == 'auto'

- name: Load distro swap sizing table
  ansible.builtin.set_fact:
    _swap_table: "{{ lookup('vars', 'swap_' + (ansible_distribution | lower) + '_table', default=[]) }}"
  when: swap_size_mode == 'auto'

- name: Fail if distro table not found
  ansible.builtin.fail:
    msg: "No swap sizing table defined for distribution '{{ ansible_distribution }}' ({{ ansible_os_family }}). Set swap_size_mode to a specific size in MB."
  when: swap_size_mode == 'auto' and _swap_table | length == 0

- name: Find matching swap row by RAM
  ansible.builtin.set_fact:
    _swap_row: "{{ item }}"
  loop: "{{ _swap_table }}"
  when:
    - swap_size_mode == 'auto'
    - item.min_ram_mb | int <= ansible_memtotal_mb | int
    - item.max_ram_mb | int == -1 or item.max_ram_mb | int >= ansible_memtotal_mb | int

- name: Ensure a match was found
  ansible.builtin.assert:
    that: _swap_row is defined
    fail_msg: "No swap table row matched {{ ansible_memtotal_mb }} MB RAM on {{ ansible_distribution }}"
  when: swap_size_mode == 'auto'

- name: Compute auto swap size
  ansible.builtin.set_fact:
    swap_file_size: "{{
      (_swap_row.multiplier | float * (ansible_memtotal_mb | int))
      | int
      | max(_swap_row.min_swap_mb | int)
      | min(_swap_row.max_swap_mb | int)
      if _swap_row.multiplier | float > 0
      else _swap_row.min_swap_mb | int
    }}"
  when: swap_size_mode == 'auto'

- name: Report swap size
  ansible.builtin.debug:
    msg: "Calculated swap size: {{ swap_file_size }} MB (RAM: {{ ansible_memtotal_mb }} MB)"
  when: swap_size_mode == 'auto'

- name: Write swap file
  ansible.builtin.command:
    cmd: "dd if=/dev/zero of={{ swap_file_path }} bs=1M count={{ swap_file_size }} status=progress"
    creates: "{{ swap_file_path }}"
  register: dd_result
  when: swap_enabled

- name: Set swap file permissions
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    owner: root
    group: root
    mode: "0600"
  when: swap_enabled and dd_result is changed

- name: Format as swap
  ansible.builtin.command:
    cmd: "mkswap {{ swap_file_path }}"
  when: swap_enabled and dd_result is changed

- name: Activate swap
  ansible.builtin.command:
    cmd: "swapon {{ swap_file_path }}"
  when: swap_enabled and dd_result is changed

- name: Configure swappiness
  ansible.builtin.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
    reload: true
  when: swap_enabled

- name: Add swap to fstab
  ansible.builtin.mount:
    path: none
    src: "{{ swap_file_path }}"
    fstype: swap
    opts: sw
    passno: 0
    dump: 0
    state: present
  when: swap_enabled

- name: Disable swap
  ansible.builtin.command:
    cmd: swapoff --all
  when: not swap_enabled

- name: Remove swap entry from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '\s*{{ swap_file_path | regex_escape }}\s+none\s+swap\s+.*'
    replace: ''
  when: not swap_enabled

- name: Remove swap file
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    state: absent
  when: not swap_enabled
