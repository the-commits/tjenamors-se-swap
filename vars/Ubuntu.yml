---
# Ubuntu swap sizing (canonical guidance – conservative on low-RAM,
# capped at 8 GB for large systems)
# RAM < 1  GB → 1 × RAM (min 256 MB)
# RAM 1–2 GB → 512 MB
# RAM 2–4 GB → 1 GB
# RAM 4–8 GB → 2 GB
# RAM > 8 GB → 2 GB (disabled by default on cloud)
swap_ubuntu_table:
  - min_ram_mb: 0
    max_ram_mb: 1024
    multiplier: 1
    min_swap_mb: 256
    max_swap_mb: 1024
  - min_ram_mb: 1024
    max_ram_mb: 2048
    multiplier: 0
    min_swap_mb: 512
    max_swap_mb: 512
  - min_ram_mb: 2048
    max_ram_mb: 4096
    multiplier: 0
    min_swap_mb: 1024
    max_swap_mb: 1024
  - min_ram_mb: 4096
    max_ram_mb: 8192
    multiplier: 0
    min_swap_mb: 2048
    max_swap_mb: 2048
  - min_ram_mb: 8192
    max_ram_mb: -1
    multiplier: 0
    min_swap_mb: 2048
    max_swap_mb: 2048

# Ubuntu server cloud images disable swap by default.
# We override only if swap_size_mode is not 'auto'.
swap_ubuntu_default_swappiness: 60
