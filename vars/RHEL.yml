---
# RHEL family swap sizing (from Red Hat KB)
# RAM ≤ 2  GB  → 2 × RAM
# RAM 2–8 GB  → 1 × RAM
# RAM 8–64 GB → 0.5 × RAM
# RAM > 64 GB → 4 GB minimum
swap_rhel_table:
  - min_ram_mb: 0
    max_ram_mb: 2048
    multiplier: 2
    min_swap_mb: 0
    max_swap_mb: 4096
  - min_ram_mb: 2048
    max_ram_mb: 8192
    multiplier: 1
    min_swap_mb: 2048
    max_swap_mb: 8192
  - min_ram_mb: 8192
    max_ram_mb: 65536
    multiplier: 0.5
    min_swap_mb: 4096
    max_swap_mb: 32768
  - min_ram_mb: 65536
    max_ram_mb: -1
    multiplier: 0
    min_swap_mb: 4096
    max_swap_mb: 4096
